name: Build

on:
  workflow_call:
    inputs:
      fetch-depth:
        description: Git checkout depth. Release builds need tags, so they pass 0.
        required: false
        type: number
        default: 1
      package-profile:
        description: Build packages with the slower size-optimized Rust distribution profile.
        required: false
        type: boolean
        default: false
      require-credentials:
        description: Fail the build if the YouTube OAuth client ID/secret are missing (release builds pass true).
        required: false
        type: boolean
        default: false
    secrets:
      GE_YOUTUBE_CLIENT_ID:
        required: false
      GE_YOUTUBE_CLIENT_SECRET:
        required: false

permissions:
  contents: read

jobs:
  check-credentials:
    name: Check YouTube credentials
    # Only runs for release (tag) builds, which pass require-credentials: true.
    if: ${{ inputs.require-credentials }}
    runs-on: ubuntu-latest
    steps:
      - name: Report credential presence
        env:
          GE_YOUTUBE_CLIENT_ID: ${{ secrets.GE_YOUTUBE_CLIENT_ID }}
          GE_YOUTUBE_CLIENT_SECRET: ${{ secrets.GE_YOUTUBE_CLIENT_SECRET }}
          REQUIRE_CREDENTIALS: ${{ inputs.require-credentials }}
        run: |
          if [ -n "$GE_YOUTUBE_CLIENT_ID" ]; then id_state=present; else id_state=MISSING; fi
          if [ -n "$GE_YOUTUBE_CLIENT_SECRET" ]; then secret_state=present; else secret_state=MISSING; fi
          echo "### YouTube credentials: id=$id_state secret=$secret_state" >> "$GITHUB_STEP_SUMMARY"
          echo "YouTube client ID: $id_state"
          echo "YouTube client secret: $secret_state"
          if [ "$REQUIRE_CREDENTIALS" = "true" ] && { [ "$id_state" = MISSING ] || [ "$secret_state" = MISSING ]; }; then
            echo "::error::YouTube client ID and/or secret missing!"
            exit 1
          fi

  linux:
    name: Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            obs2/browser/package-lock.json
            test/package-lock.json

      - name: Cache static dependencies
        uses: actions/cache@v6
        with:
          path: |
            obs2/vendor/archives
            obs2/vendor/obs
            obs2/vendor/opencv-static
            obs2/vendor/ffmpeg-static
          key: ${{ runner.os }}-${{ runner.arch }}-static-deps-${{ hashFiles('obs2/scripts/obs-headers.sh', 'obs2/scripts/opencv-static.sh', 'obs2/scripts/ffmpeg-static.sh') }}

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            obs2/rust/target/**/release/.fingerprint
            obs2/rust/target/**/release/build
            obs2/rust/target/**/release/deps
            obs2/rust/target/**/release/incremental
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-build-${{ hashFiles('obs2/rust/Cargo.lock', 'obs2/rust/Cargo.toml', 'obs2/rust/build.rs', 'obs2/rust/rust-toolchain.toml') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang-format \
            cmake \
            flatpak \
            just \
            libdbus-1-dev \
            libobs-dev \
            libssl-dev \
            libwayland-dev \
            nasm \
            pkg-config \
            wget
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub com.obsproject.Studio
          sudo flatpak install -y flathub "$(flatpak info --show-sdk com.obsproject.Studio)"

      - name: Set up Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component clippy
          rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Set up repository
        run: just setup

      - name: Check formatting
        if: matrix.arch == 'x86_64'
        run: |
          just fmt
          git diff --exit-code

      - name: Build Release
        run: just make-release

      - name: Run shim reload tests
        run: just test-shim

      - name: Run frame regression tests
        run: just test-cv

      - name: Upload frame regression test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: frame-regression-test-results-linux-${{ runner.arch }}
          path: test/test_results.json
          if-no-files-found: ignore

      - name: Run Browser tests
        run: just test-browser

      - name: Run Rust tests
        run: just test-rust

      - name: Run Integration tests
        run: just test-integration

      - name: Build Linux package
        run: just ${{ inputs.package-profile && 'make-package-dist' || 'make-package' }}
        env:
          GE_YOUTUBE_ENABLED: yes
          GE_YOUTUBE_CLIENT_ID: ${{ secrets.GE_YOUTUBE_CLIENT_ID }}
          GE_YOUTUBE_CLIENT_SECRET: ${{ secrets.GE_YOUTUBE_CLIENT_SECRET }}

      - name: Check Linux package contract
        run: just test-package-contract obs2/build-flatpak

      - name: Determine package name
        id: package
        run: echo "basename=$(basename obs2/build-flatpak/dist/*.zip .zip)" >> "$GITHUB_OUTPUT"

      - name: Upload Linux package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.basename }}
          path: obs2/build-flatpak/dist/*.zip
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            obs2/browser/package-lock.json
            test/package-lock.json

      - name: Cache static dependencies
        uses: actions/cache@v6
        with:
          path: |
            obs2/vendor/archives
            obs2/vendor/obs
            obs2/vendor/opencv-static
            obs2/vendor/ffmpeg-static
          key: ${{ runner.os }}-${{ runner.arch }}-static-deps-${{ hashFiles('obs2/scripts/obs-headers.sh', 'obs2/scripts/opencv-static.sh', 'obs2/scripts/ffmpeg-static.sh') }}

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            obs2/rust/target/**/release/.fingerprint
            obs2/rust/target/**/release/build
            obs2/rust/target/**/release/deps
            obs2/rust/target/**/release/incremental
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-build-${{ hashFiles('obs2/rust/Cargo.lock', 'obs2/rust/Cargo.toml', 'obs2/rust/build.rs', 'obs2/rust/rust-toolchain.toml') }}

      - name: Install system dependencies
        run: |
          brew untap --force aws/tap || true
          brew install cmake just nasm simde clang-format

      - name: Set up Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component clippy
          rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Set up repository
        run: just setup

      - name: Run shim reload tests
        run: just test-shim

      - name: Run Rust tests
        run: just test-rust

      - name: Run Integration tests
        run: just test-integration

      - name: Build macOS package
        run: just ${{ inputs.package-profile && 'make-package-dist' || 'make-package' }}
        env:
          GE_YOUTUBE_ENABLED: yes
          GE_YOUTUBE_CLIENT_ID: ${{ secrets.GE_YOUTUBE_CLIENT_ID }}
          GE_YOUTUBE_CLIENT_SECRET: ${{ secrets.GE_YOUTUBE_CLIENT_SECRET }}

      - name: Check macOS package contract
        run: just test-package-contract obs2/build

      - name: Determine package name
        id: package
        run: echo "basename=$(basename obs2/build/dist/*.zip .zip)" >> "$GITHUB_OUTPUT"

      - name: Upload macOS package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.basename }}
          path: obs2/build/dist/*.zip
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-latest

    env:
      VCPKG_ROOT: C:\vcpkg
      VCPKGRS_TRIPLET: x64-windows-static-md
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-bincache

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            obs2/browser/package-lock.json
            test/package-lock.json

      - name: Restore vcpkg dependencies
        id: restore-vcpkg
        uses: actions/cache/restore@v6
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\downloads
            .vcpkg-bincache
          key: windows-vcpkg-${{ runner.arch }}-${{ hashFiles('obs2/cmake/OpenCVStatic.cmake', 'obs2/cmake/FFmpegStatic.cmake') }}
          restore-keys: |
            windows-vcpkg-${{ runner.arch }}-

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            obs2/rust/target/**/release/.fingerprint
            obs2/rust/target/**/release/build
            obs2/rust/target/**/release/deps
            obs2/rust/target/**/release/incremental
          key: Windows-${{ runner.arch }}-cargo-build-${{ hashFiles('obs2/rust/Cargo.lock', 'obs2/rust/Cargo.toml', 'obs2/rust/build.rs', 'obs2/rust/rust-toolchain.toml') }}

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup set profile minimal
          rustup toolchain install 1.96.0 --profile minimal --component clippy --no-self-update
          rustup default 1.96.0

      - name: Install system dependencies
        shell: pwsh
        run: |
          choco install just obs-studio -y --no-progress --fail-on-unfound --fail-on-standard-error

          $libclang = Get-ChildItem `
            -Path "$env:ProgramFiles\LLVM", "${env:ProgramFiles(x86)}\LLVM" `
            -Filter libclang.dll `
            -Recurse `
            -ErrorAction SilentlyContinue `
            | Select-Object -First 1
          if (-not $libclang) {
            choco install llvm -y --no-progress --fail-on-unfound --fail-on-standard-error
            $libclang = Get-ChildItem `
              -Path "$env:ProgramFiles\LLVM", "${env:ProgramFiles(x86)}\LLVM" `
              -Filter libclang.dll `
              -Recurse `
              -ErrorAction SilentlyContinue `
              | Select-Object -First 1
          }
          if (-not $libclang) {
            throw "libclang.dll was not found after LLVM setup"
          }
          "LIBCLANG_PATH=$($libclang.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          $libclang.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install vcpkg dependencies
        id: install-vcpkg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          vcpkg install --triplet $env:VCPKGRS_TRIPLET --clean-after-build opencv4 ffmpeg simde
          Remove-Item -Recurse -Force C:\vcpkg\buildtrees\* -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force C:\vcpkg\packages\* -ErrorAction SilentlyContinue

      - name: Save vcpkg dependencies
        if: steps.install-vcpkg.outcome == 'success' && steps.restore-vcpkg.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\downloads
            .vcpkg-bincache
          key: ${{ steps.restore-vcpkg.outputs.cache-primary-key }}

      - name: Set up repository
        shell: bash
        run: |
          just obs-headers
          cd obs2/browser && npm install
          cd ../../test && npm install

      # Runs vcvarsall once and persists the resulting environment (INCLUDE,
      # LIB, LIBPATH, PATH, etc.) via $GITHUB_ENV for every later step in this
      # job -- `set`'s own "NAME=value" per-line output format happens to be
      # exactly what $GITHUB_ENV expects, so no diffing or parsing is needed,
      # just redirecting it there directly. This way the test steps and the
      # packaging step share exactly the same compiler environment instead of
      # each re-deriving it (and potentially diverging) independently.
      - name: Set up MSVC environment
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALLDIR=%%i"
          call "%VSINSTALLDIR%\Common7\Tools\VsDevCmd.bat" -arch=x64
          for /d %%i in ("%VSINSTALLDIR%\VC\Tools\MSVC\*") do (
            set "VCTOOLS_DIR=%%~fi"
          )
          if not defined VCTOOLS_DIR (
            echo MSVC tools directory was not found under "%VSINSTALLDIR%\VC\Tools\MSVC".
            exit /b 1
          )
          set "VCToolsInstallDir=%VCTOOLS_DIR%\"
          set "VC_INCLUDE=%VCTOOLS_DIR%\include"
          if not exist "%VC_INCLUDE%\vcruntime.h" (
            echo vcruntime.h was not found under "%VC_INCLUDE%".
            exit /b 1
          )
          set "INCLUDE=%VC_INCLUDE%;%INCLUDE%"
          set > "%GITHUB_ENV%"
          setlocal EnableDelayedExpansion
          set "CLANGARGS="
          for %%P in ("!INCLUDE:;=" "!") do (
            if defined CLANGARGS (
              set "CLANGARGS=!CLANGARGS! -I"%%~P""
            ) else (
              set "CLANGARGS=-I"%%~P""
            )
          )
          echo BINDGEN_EXTRA_CLANG_ARGS=!CLANGARGS!>> "%GITHUB_ENV%"
          endlocal

      - name: Run shim reload tests
        shell: bash
        run: just test-shim

      - name: Run Rust tests
        shell: bash
        run: just test-rust

      - name: Run Integration tests
        shell: bash
        run: just test-integration

      - name: Build Windows package
        shell: bash
        run: just ${{ inputs.package-profile && 'make-package-dist' || 'make-package' }}
        env:
          GE_YOUTUBE_ENABLED: yes
          GE_YOUTUBE_CLIENT_ID: ${{ secrets.GE_YOUTUBE_CLIENT_ID }}
          GE_YOUTUBE_CLIENT_SECRET: ${{ secrets.GE_YOUTUBE_CLIENT_SECRET }}

      - name: Check Windows package contract
        shell: bash
        run: just test-package-contract obs2/build

      - name: Determine package name
        id: package
        shell: bash
        run: echo "basename=$(basename obs2/build/dist/*.zip .zip)" >> "$GITHUB_OUTPUT"

      - name: Upload Windows package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.basename }}
          path: obs2/build/dist/*.zip
          if-no-files-found: error
