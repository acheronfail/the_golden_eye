name: Build

on:
  workflow_call:
    inputs:
      fetch-depth:
        description: Git checkout depth. Release builds need tags, so they pass 0.
        required: false
        type: number
        default: 1
      package-profile:
        description: Build packages with the slower size-optimized Rust distribution profile.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            obs2/browser/package-lock.json
            test/package-lock.json

      - name: Cache static dependencies
        uses: actions/cache@v6
        with:
          path: |
            obs2/vendor/archives
            obs2/vendor/obs
            obs2/vendor/opencv-static
            obs2/vendor/ffmpeg-static
          key: ${{ runner.os }}-static-deps-${{ hashFiles('obs2/scripts/obs-headers.sh', 'obs2/scripts/opencv-static.sh', 'obs2/scripts/ffmpeg-static.sh') }}

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            obs2/rust/target/**/release/.fingerprint
            obs2/rust/target/**/release/build
            obs2/rust/target/**/release/deps
            obs2/rust/target/**/release/incremental
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-build-${{ hashFiles('obs2/rust/Cargo.lock', 'obs2/rust/Cargo.toml', 'obs2/rust/build.rs', 'obs2/rust/rust-toolchain.toml') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang-format \
            cmake \
            flatpak \
            just \
            libdbus-1-dev \
            libobs-dev \
            libssl-dev \
            libwayland-dev \
            nasm \
            pkg-config \
            wget
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub com.obsproject.Studio
          sudo flatpak install -y flathub "$(flatpak info --show-sdk com.obsproject.Studio)"

      - name: Set up Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component clippy
          rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Set up repository
        run: just setup

      - name: Check formatting
        run: |
          just fmt
          git diff --exit-code

      - name: Build Release
        run: just make-release

      - name: Run shim reload tests
        run: just test-shim

      - name: Run frame regression tests
        run: just test-cv

      - name: Upload frame regression test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: frame-regression-test-results-linux
          path: test/test_results.json
          if-no-files-found: ignore

      - name: Run Browser tests
        run: just test-browser

      - name: Run Rust tests
        run: just test-rust

      - name: Run Integration tests
        run: just test-integration

      - name: Build Linux package
        run: just ${{ inputs.package-profile && 'make-package-dist' || 'make-package' }}

      - name: Upload Linux package
        uses: actions/upload-artifact@v7
        with:
          name: the-golden-eye-linux
          path: obs2/build-flatpak/dist/*.zip
          if-no-files-found: error

  macos:
    name: macOS
    runs-on: macos-latest
    needs: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            obs2/browser/package-lock.json
            test/package-lock.json

      - name: Cache static dependencies
        uses: actions/cache@v6
        with:
          path: |
            obs2/vendor/archives
            obs2/vendor/obs
            obs2/vendor/opencv-static
            obs2/vendor/ffmpeg-static
          key: ${{ runner.os }}-static-deps-${{ hashFiles('obs2/scripts/obs-headers.sh', 'obs2/scripts/opencv-static.sh', 'obs2/scripts/ffmpeg-static.sh') }}

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            obs2/rust/target/**/release/.fingerprint
            obs2/rust/target/**/release/build
            obs2/rust/target/**/release/deps
            obs2/rust/target/**/release/incremental
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-build-${{ hashFiles('obs2/rust/Cargo.lock', 'obs2/rust/Cargo.toml', 'obs2/rust/build.rs', 'obs2/rust/rust-toolchain.toml') }}

      - name: Install system dependencies
        run: |
          brew untap --force aws/tap || true
          brew install cmake just nasm simde clang-format

      - name: Set up Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component clippy
          rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Set up repository
        run: just setup

      - name: Run shim reload tests
        run: just test-shim

      - name: Run Rust tests
        run: just test-rust

      - name: Run Integration tests
        run: just test-integration

      - name: Build macOS package
        run: just ${{ inputs.package-profile && 'make-package-dist' || 'make-package' }}

      - name: Upload macOS package
        uses: actions/upload-artifact@v7
        with:
          name: the-golden-eye-macos
          path: obs2/build/dist/*.zip
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-latest
    needs: linux

    env:
      VCPKG_ROOT: C:\vcpkg
      VCPKGRS_TRIPLET: x64-windows-static-md
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-bincache

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            obs2/browser/package-lock.json
            test/package-lock.json

      - name: Restore vcpkg dependencies
        id: restore-vcpkg
        uses: actions/cache/restore@v6
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\downloads
            .vcpkg-bincache
          key: windows-vcpkg-${{ runner.arch }}-${{ hashFiles('obs2/cmake/OpenCVStatic.cmake', 'obs2/cmake/FFmpegStatic.cmake') }}
          restore-keys: |
            windows-vcpkg-${{ runner.arch }}-

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            obs2/rust/target/**/release/.fingerprint
            obs2/rust/target/**/release/build
            obs2/rust/target/**/release/deps
            obs2/rust/target/**/release/incremental
          key: Windows-${{ runner.arch }}-cargo-build-${{ hashFiles('obs2/rust/Cargo.lock', 'obs2/rust/Cargo.toml', 'obs2/rust/build.rs', 'obs2/rust/rust-toolchain.toml') }}

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup set profile minimal
          rustup toolchain install 1.96.0 --profile minimal --component clippy --no-self-update
          rustup default 1.96.0

      - name: Install system dependencies
        shell: pwsh
        run: |
          choco install just obs-studio -y --no-progress

          $libclang = Get-ChildItem `
            -Path "$env:ProgramFiles\LLVM", "${env:ProgramFiles(x86)}\LLVM" `
            -Filter libclang.dll `
            -Recurse `
            -ErrorAction SilentlyContinue `
            | Select-Object -First 1
          if (-not $libclang) {
            choco install llvm -y --no-progress
            $libclang = Get-ChildItem `
              -Path "$env:ProgramFiles\LLVM", "${env:ProgramFiles(x86)}\LLVM" `
              -Filter libclang.dll `
              -Recurse `
              -ErrorAction SilentlyContinue `
              | Select-Object -First 1
          }
          if (-not $libclang) {
            throw "libclang.dll was not found after LLVM setup"
          }
          "LIBCLANG_PATH=$($libclang.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          $libclang.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install vcpkg dependencies
        id: install-vcpkg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          vcpkg install --triplet $env:VCPKGRS_TRIPLET --clean-after-build opencv4 ffmpeg simde
          Remove-Item -Recurse -Force C:\vcpkg\buildtrees\* -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force C:\vcpkg\packages\* -ErrorAction SilentlyContinue

      - name: Save vcpkg dependencies
        if: steps.install-vcpkg.outcome == 'success' && steps.restore-vcpkg.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\downloads
            .vcpkg-bincache
          key: ${{ steps.restore-vcpkg.outputs.cache-primary-key }}

      - name: Set up repository
        shell: bash
        run: |
          just obs-headers
          cd obs2/browser && npm install
          cd ../../test && npm install

      # Runs vcvarsall once and persists INCLUDE/LIB/LIBPATH/PATH via
      # $GITHUB_ENV/$GITHUB_PATH for every later step in this job -- so the
      # test steps and the packaging step share exactly the same compiler
      # environment instead of each re-deriving it (and potentially
      # diverging) independently.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v3
        with:
          arch: x64

      # bindgen (used by ffmpeg-sys-next's build.rs) invokes its own libclang,
      # which doesn't automatically pick up the INCLUDE variable vcvarsall
      # just set -- BINDGEN_EXTRA_CLANG_ARGS is bindgen's own mechanism for
      # this, so translate INCLUDE into -I flags once, here, rather than
      # per-step.
      - name: Set up bindgen include paths
        shell: pwsh
        run: |
          $includePaths = $env:INCLUDE -split ';' | Where-Object { $_ -ne '' }
          $clangArgs = ($includePaths | ForEach-Object { '-I"' + $_ + '"' }) -join ' '
          "BINDGEN_EXTRA_CLANG_ARGS=$clangArgs" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run shim reload tests
        shell: bash
        run: just test-shim

      - name: Run Rust tests
        shell: bash
        run: just test-rust

      - name: Run Integration tests
        shell: bash
        run: just test-integration

      - name: Build Windows package
        shell: bash
        run: just ${{ inputs.package-profile && 'make-package-dist' || 'make-package' }}

      - name: Upload Windows package
        uses: actions/upload-artifact@v7
        with:
          name: the-golden-eye-windows
          path: obs2/build/dist/*.zip
          if-no-files-found: error
