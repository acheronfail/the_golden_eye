name: Build

on:
  workflow_call:
    inputs:
      fetch-depth:
        description: Git checkout depth. Release builds need tags, so they pass 0.
        required: false
        type: number
        default: 1
      package-profile:
        description: Build packages with the slower size-optimized Rust distribution profile.
        required: false
        type: boolean
        default: false
      require-macos-signing:
        description: Fail (instead of warn) if macOS signing/notarization can't run. Releases pass true.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        # No current aarch64 build of OBS right now, but maybe in the future...
        include:
          - arch: x86_64
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            obs2/browser/package-lock.json
            test/package-lock.json

      - name: Cache static dependencies
        uses: actions/cache@v6
        with:
          path: |
            obs2/vendor/archives
            obs2/vendor/obs
            obs2/vendor/opencv-static
            obs2/vendor/ffmpeg-static
          key: ${{ runner.os }}-${{ runner.arch }}-static-deps-${{ hashFiles('obs2/scripts/obs-headers.sh', 'obs2/scripts/opencv-static.sh', 'obs2/scripts/ffmpeg-static.sh') }}

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            obs2/rust/target/**/release/.fingerprint
            obs2/rust/target/**/release/build
            obs2/rust/target/**/release/deps
            obs2/rust/target/**/release/incremental
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-build-${{ hashFiles('obs2/rust/Cargo.lock', 'obs2/rust/Cargo.toml', 'obs2/rust/build.rs', 'obs2/rust/rust-toolchain.toml') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang-format \
            cmake \
            flatpak \
            just \
            libdbus-1-dev \
            libobs-dev \
            libssl-dev \
            libwayland-dev \
            nasm \
            pkg-config \
            wget
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub com.obsproject.Studio
          sudo flatpak install -y flathub "$(flatpak info --show-sdk com.obsproject.Studio)"

      - name: Set up Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component clippy
          rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Set up repository
        run: just setup

      - name: Check formatting
        if: matrix.arch == 'x86_64'
        run: |
          just fmt
          git diff --exit-code

      - name: Build Release
        run: just make-release

      - name: Run shim reload tests
        run: just test-shim

      - name: Run frame regression tests
        run: just test-cv

      - name: Upload frame regression test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: frame-regression-test-results-linux-${{ runner.arch }}
          path: test/test_results.json
          if-no-files-found: ignore

      - name: Run Browser tests
        run: just test-browser

      - name: Run Rust tests
        run: just test-rust

      - name: Run Integration tests
        run: just test-integration

      - name: Build Linux package
        run: just ${{ inputs.package-profile && 'make-package-dist' || 'make-package' }}

      - name: Determine package name
        id: package
        run: echo "basename=$(basename obs2/build-flatpak/dist/*.zip .zip)" >> "$GITHUB_OUTPUT"

      - name: Upload Linux package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.basename }}
          path: obs2/build-flatpak/dist/*.zip
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    # When true, the packaging script turns "no signing identity / no notary
    # credentials" from a warning into a hard error (release builds pass true).
    env:
      GE_CODESIGN_REQUIRED: ${{ inputs.require-macos-signing && '1' || '' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            obs2/browser/package-lock.json
            test/package-lock.json

      - name: Cache static dependencies
        uses: actions/cache@v6
        with:
          path: |
            obs2/vendor/archives
            obs2/vendor/obs
            obs2/vendor/opencv-static
            obs2/vendor/ffmpeg-static
          key: ${{ runner.os }}-${{ runner.arch }}-static-deps-${{ hashFiles('obs2/scripts/obs-headers.sh', 'obs2/scripts/opencv-static.sh', 'obs2/scripts/ffmpeg-static.sh') }}

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            obs2/rust/target/**/release/.fingerprint
            obs2/rust/target/**/release/build
            obs2/rust/target/**/release/deps
            obs2/rust/target/**/release/incremental
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-build-${{ hashFiles('obs2/rust/Cargo.lock', 'obs2/rust/Cargo.toml', 'obs2/rust/build.rs', 'obs2/rust/rust-toolchain.toml') }}

      - name: Install system dependencies
        run: |
          brew untap --force aws/tap || true
          brew install cmake just nasm simde clang-format

      - name: Set up Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component clippy
          rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Set up repository
        run: just setup

      - name: Run shim reload tests
        run: just test-shim

      - name: Run Rust tests
        run: just test-rust

      - name: Run Integration tests
        run: just test-integration

      # Imports the Developer ID Application cert into a throwaway keychain (codesign
      # can only read the key from a keychain). No-ops with an unsigned package when
      # the secret is absent (fork PRs), unless GE_CODESIGN_REQUIRED forces a failure.
      - name: Import macOS signing certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERTIFICATE_P12}" ]; then
            echo "No MACOS_CERTIFICATE_P12 secret; package will be unsigned."
            exit 0
          fi
          keychain="$RUNNER_TEMP/ge-signing.keychain-db"
          cert="$RUNNER_TEMP/certificate.p12"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$cert"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain"
          security import "$cert" -k "$keychain" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$keychain"
          security list-keychains -d user -s "$keychain" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$cert"
          identity="$(security find-identity -v -p codesigning "$keychain" | awk '/Developer ID Application/ {print $2; exit}')"
          echo "GE_CODESIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "GE_CODESIGN_KEYCHAIN=$keychain" >> "$GITHUB_ENV"

      # Materializes the App Store Connect API key to the ephemeral runner temp dir
      # (notarytool --key takes only a file path). No-ops when the secret is absent.
      - name: Prepare notary credentials
        env:
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_NOTARY_KEY}" ]; then
            echo "No MACOS_NOTARY_KEY secret; package will be signed but not notarized."
            exit 0
          fi
          key="$RUNNER_TEMP/notary-key.p8"
          echo "$MACOS_NOTARY_KEY" | base64 --decode > "$key"
          echo "GE_NOTARY_KEY=$key" >> "$GITHUB_ENV"
          echo "GE_NOTARY_KEY_ID=$MACOS_NOTARY_KEY_ID" >> "$GITHUB_ENV"
          echo "GE_NOTARY_ISSUER=$MACOS_NOTARY_ISSUER" >> "$GITHUB_ENV"

      - name: Build macOS package
        run: just ${{ inputs.package-profile && 'make-package-dist' || 'make-package' }}

      - name: Determine package name
        id: package
        run: echo "basename=$(basename obs2/build/dist/*.zip .zip)" >> "$GITHUB_OUTPUT"

      - name: Upload macOS package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.basename }}
          path: obs2/build/dist/*.zip
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-latest

    env:
      VCPKG_ROOT: C:\vcpkg
      VCPKGRS_TRIPLET: x64-windows-static-md
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-bincache

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            obs2/browser/package-lock.json
            test/package-lock.json

      - name: Restore vcpkg dependencies
        id: restore-vcpkg
        uses: actions/cache/restore@v6
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\downloads
            .vcpkg-bincache
          key: windows-vcpkg-${{ runner.arch }}-${{ hashFiles('obs2/cmake/OpenCVStatic.cmake', 'obs2/cmake/FFmpegStatic.cmake') }}
          restore-keys: |
            windows-vcpkg-${{ runner.arch }}-

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            obs2/rust/target/**/release/.fingerprint
            obs2/rust/target/**/release/build
            obs2/rust/target/**/release/deps
            obs2/rust/target/**/release/incremental
          key: Windows-${{ runner.arch }}-cargo-build-${{ hashFiles('obs2/rust/Cargo.lock', 'obs2/rust/Cargo.toml', 'obs2/rust/build.rs', 'obs2/rust/rust-toolchain.toml') }}

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup set profile minimal
          rustup toolchain install 1.96.0 --profile minimal --component clippy --no-self-update
          rustup default 1.96.0

      - name: Install system dependencies
        shell: pwsh
        run: |
          choco install just obs-studio -y --no-progress

          $libclang = Get-ChildItem `
            -Path "$env:ProgramFiles\LLVM", "${env:ProgramFiles(x86)}\LLVM" `
            -Filter libclang.dll `
            -Recurse `
            -ErrorAction SilentlyContinue `
            | Select-Object -First 1
          if (-not $libclang) {
            choco install llvm -y --no-progress
            $libclang = Get-ChildItem `
              -Path "$env:ProgramFiles\LLVM", "${env:ProgramFiles(x86)}\LLVM" `
              -Filter libclang.dll `
              -Recurse `
              -ErrorAction SilentlyContinue `
              | Select-Object -First 1
          }
          if (-not $libclang) {
            throw "libclang.dll was not found after LLVM setup"
          }
          "LIBCLANG_PATH=$($libclang.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          $libclang.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install vcpkg dependencies
        id: install-vcpkg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          vcpkg install --triplet $env:VCPKGRS_TRIPLET --clean-after-build opencv4 ffmpeg simde
          Remove-Item -Recurse -Force C:\vcpkg\buildtrees\* -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force C:\vcpkg\packages\* -ErrorAction SilentlyContinue

      - name: Save vcpkg dependencies
        if: steps.install-vcpkg.outcome == 'success' && steps.restore-vcpkg.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\downloads
            .vcpkg-bincache
          key: ${{ steps.restore-vcpkg.outputs.cache-primary-key }}

      - name: Set up repository
        shell: bash
        run: |
          just obs-headers
          cd obs2/browser && npm install
          cd ../../test && npm install

      # Runs vcvarsall once and persists the resulting environment (INCLUDE,
      # LIB, LIBPATH, PATH, etc.) via $GITHUB_ENV for every later step in this
      # job -- `set`'s own "NAME=value" per-line output format happens to be
      # exactly what $GITHUB_ENV expects, so no diffing or parsing is needed,
      # just redirecting it there directly. This way the test steps and the
      # packaging step share exactly the same compiler environment instead of
      # each re-deriving it (and potentially diverging) independently.
      - name: Set up MSVC environment
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALLDIR=%%i"
          call "%VSINSTALLDIR%\Common7\Tools\VsDevCmd.bat" -arch=x64
          for /d %%i in ("%VSINSTALLDIR%\VC\Tools\MSVC\*") do (
            set "VCTOOLS_DIR=%%~fi"
          )
          if not defined VCTOOLS_DIR (
            echo MSVC tools directory was not found under "%VSINSTALLDIR%\VC\Tools\MSVC".
            exit /b 1
          )
          set "VCToolsInstallDir=%VCTOOLS_DIR%\"
          set "VC_INCLUDE=%VCTOOLS_DIR%\include"
          if not exist "%VC_INCLUDE%\vcruntime.h" (
            echo vcruntime.h was not found under "%VC_INCLUDE%".
            exit /b 1
          )
          set "INCLUDE=%VC_INCLUDE%;%INCLUDE%"
          set > "%GITHUB_ENV%"
          setlocal EnableDelayedExpansion
          set "CLANGARGS="
          for %%P in ("!INCLUDE:;=" "!") do (
            if defined CLANGARGS (
              set "CLANGARGS=!CLANGARGS! -I"%%~P""
            ) else (
              set "CLANGARGS=-I"%%~P""
            )
          )
          echo BINDGEN_EXTRA_CLANG_ARGS=!CLANGARGS!>> "%GITHUB_ENV%"
          endlocal

      - name: Run shim reload tests
        shell: bash
        run: just test-shim

      - name: Run Rust tests
        shell: bash
        run: just test-rust

      - name: Run Integration tests
        shell: bash
        run: just test-integration

      - name: Build Windows package
        shell: bash
        run: just ${{ inputs.package-profile && 'make-package-dist' || 'make-package' }}

      - name: Determine package name
        id: package
        shell: bash
        run: echo "basename=$(basename obs2/build/dist/*.zip .zip)" >> "$GITHUB_OUTPUT"

      - name: Upload Windows package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.basename }}
          path: obs2/build/dist/*.zip
          if-no-files-found: error
