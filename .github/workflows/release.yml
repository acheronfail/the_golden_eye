name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build packages
    uses: ./.github/workflows/build-packages.yml
    with:
      fetch-depth: 0

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v5
        with:
          pattern: the-golden-eye-*
          merge-multiple: true
          path: dist

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.zip --verify-tag --generate-notes
