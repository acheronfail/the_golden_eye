name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build-packages.yml
    secrets: inherit
    with:
      fetch-depth: 0
      package-profile: true

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: the_golden_eye-*
          merge-multiple: true
          path: dist

      # NOTE: this is used by the plugin's auto-update mechanism
      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.zip > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          is_prerelease=false
          release_kind=stable
          if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            is_prerelease=true
            release_kind=prerelease
          fi

          previous_tag="$({
            gh api --paginate "repos/${GH_REPO}/releases" \
              --jq ".[] | select(.draft == false and .prerelease == ${is_prerelease}) | .tag_name"
          } | grep -Fxv "$GITHUB_REF_NAME" | head -n1 || true)"

          args=(release create "$GITHUB_REF_NAME" dist/*.zip dist/checksums.txt --verify-tag --generate-notes)
          if [[ -n "$previous_tag" ]]; then
            echo "Generating release notes from ${previous_tag}..${GITHUB_REF_NAME}"
            args+=(--notes-start-tag "$previous_tag")
          else
            echo "No previous ${release_kind} release found; generating notes without an explicit start tag"
          fi

          if [[ "$is_prerelease" == true ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"
