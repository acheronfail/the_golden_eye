name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build-packages.yml
    secrets: inherit
    with:
      fetch-depth: 0
      package-profile: true

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: the_golden_eye-*
          merge-multiple: true
          path: dist

      # NOTE: this is used by the plugin's auto-update mechanism
      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.zip > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          args=(release create "$GITHUB_REF_NAME" dist/*.zip dist/checksums.txt --verify-tag --generate-notes)
          if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"
