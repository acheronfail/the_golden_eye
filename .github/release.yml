changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
      - github-actions
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
    - title: Features
      labels:
        - enhancement
    - title: Changes
      labels:
        - tweak
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Developer Experience
      labels:
        - repository
        - dev
        - ci
    - title: Dependencies
      labels:
        - dependencies
    - title: Other Changes
      labels:
        - '*'
