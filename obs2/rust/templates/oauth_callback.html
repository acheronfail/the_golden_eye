<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{title}} · The Golden Eye</title>
    {{close_script}}
    <style>
      :root {
        color-scheme: dark;
        --obs-bg: #090b10;
        --obs-panel: #12151d;
        --obs-border: #2b313d;
        --obs-border-soft: #3a4050;
        --obs-gold-hover: #f0cf5a;
        --obs-text: #e8edf7;
        --obs-text-muted: #9da7b8;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        min-height: 100%;
        margin: 0;
      }
      body {
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
          radial-gradient(circle at top, rgb(201 162 39 / 12%), transparent 24rem), var(--obs-bg);
        color: var(--obs-text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      main {
        width: min(34rem, 100%);
        padding: 2rem;
        text-align: center;
        background: var(--obs-panel);
        border: 1px solid var(--obs-border);
        border-radius: 0.75rem;
        box-shadow:
          0 18px 48px rgb(0 0 0 / 45%),
          inset 0 1px 0 var(--obs-border-soft);
      }
      pre {
        display: inline-block;
        margin: 0 0 1.5rem;
        color: var(--obs-gold-hover);
        font:
          700 10px/1.17 ui-monospace,
          SFMono-Regular,
          Menlo,
          Monaco,
          Consolas,
          "Liberation Mono",
          "Courier New",
          monospace;
        text-align: left;
        white-space: pre;
      }
      h1 {
        margin: 0 0 0.75rem;
        color: var(--obs-gold-hover);
        font-size: 1.25rem;
      }
      p {
        margin: 0;
        color: var(--obs-text-muted);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <pre>
┏┳┓┓     ┏┓  ┓ ┓      ┏┓
 ┃ ┣┓┏┓  ┃┓┏┓┃┏┫┏┓┏┓  ┣ ┓┏┏┓
 ┻ ┛┗┗   ┗┛┗┛┗┗┻┗ ┛┗  ┗┛┗┫┗
                         ┛</pre
      >
      <h1>{{title}}</h1>
      <p>{{message}}</p>
    </main>
  </body>
</html>
