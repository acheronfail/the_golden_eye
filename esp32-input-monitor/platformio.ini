; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Without a default env, `platformio run` can iterate across all envs.
; Pin uploads to the USB target unless explicitly overridden with `-e`.
default_envs = esp32-s3-devkitc-1

; Shared settings inherited by all envs below.
[env]
platform = espressif32
framework = arduino

; Keep the CPU at full speed -- the bit-bang timing assumes 240 MHz.
board_build.f_cpu = 240000000L

; AsyncTCP stability tuning for sustained websocket traffic.
build_flags =
  -D CONFIG_ASYNC_TCP_QUEUE_SIZE=128
  -D CONFIG_ASYNC_TCP_MAX_ACK_TIME=10000
  -D CONFIG_ASYNC_TCP_STACK_SIZE=4096
  -D WS_MAX_QUEUED_MESSAGES=64

; Async HTTP + WebSocket server used to serve the UI and push button state.
; The actively-maintained ESP32Async forks.
lib_deps =
  https://github.com/ESP32Async/AsyncTCP.git
  https://github.com/ESP32Async/ESPAsyncWebServer.git
  ; Captive setup portal for WiFi credentials (no hardcoded SSID/password).
  https://github.com/tzapu/WiFiManager.git

; Decode crash backtraces (register dumps -> function names + line numbers) in the serial monitor.
monitor_filters = esp32_exception_decoder

; Shared S3-specific flags. Referenced by all esp32-s3-* envs so that adding
; a flag here automatically reaches the debug/OTA variants too.
; (PlatformIO custom sections are interpolated as ${s3_flags.key}.)
[s3_flags]
build_flags =
  ${env.build_flags}
  ; Route Serial to the USB CDC port (the only connector on the Super Mini).
  ; Without this, Serial maps to UART0 hardware pins and produces no output.
  -D ARDUINO_USB_CDC_ON_BOOT=1

[env:esp32-s3-devkitc-1]
; esp32-s3-devkitc-1 matches the Super Mini: no PSRAM, 4 MB flash.
; lolin_s3_mini was wrong -- it enables PSRAM which the Super Mini lacks.
board = esp32-s3-devkitc-1
board_upload.flash_size = 4MB
board_build.partitions = default.csv
build_flags = ${s3_flags.build_flags}

[env:esp32dev]
board = esp32dev

; Wireless flashing. After the device has been flashed once over USB (so the
; ArduinoOTA listener is running) and joined your WiFi, reflash with:
;   pio run -e esp32-s3-devkitc-1_ota -t upload
; Inherits everything from esp32-s3-devkitc-1 and just swaps the uploader to network OTA.
[env:esp32-s3-devkitc-1_ota]
extends = env:esp32-s3-devkitc-1
upload_protocol = espota
; The device advertises this mDNS name (OTA_HOSTNAME in main.cpp). Swap for the
; raw IP if .local discovery doesn't resolve on your network.
upload_port = n64spy.local
; If you set OTA_PASSWORD in main.cpp, uncomment and match it here:
; upload_flags = --auth=your-password-here

; Debug build: same as esp32-s3-devkitc-1 but prints a periodic "loop alive" heartbeat so
; you can tell the sniffer is running even with no console attached. Flash with:
;   pio run -e esp32-s3-devkitc-1_debug -t upload
; NOTE: do a clean build after flag changes: pio run -e esp32-s3-devkitc-1_debug -t clean
[env:esp32-s3-devkitc-1_debug]
extends = env:esp32-s3-devkitc-1
; build_type = debug adds -g so esp32_exception_decoder can resolve crash
; backtraces to file names and line numbers instead of raw addresses.
build_type = debug
; Use the direct filter so all raw bytes from the device appear immediately
; without any buffering or transformation from the exception decoder.
monitor_filters = direct
build_flags =
  ${s3_flags.build_flags}
  -D DEBUG_HEARTBEAT

; Wireless flashing. After the device has been flashed once over USB (so the
; ArduinoOTA listener is running) and joined your WiFi, reflash with:
;   pio run -e esp32dev_ota -t upload
; Inherits everything from esp32dev and just swaps the uploader to network OTA.
[env:esp32dev_ota]
extends = env:esp32dev
upload_protocol = espota
; The device advertises this mDNS name (OTA_HOSTNAME in main.cpp). Swap for the
; raw IP if .local discovery doesn't resolve on your network.
upload_port = n64spy.local
; If you set OTA_PASSWORD in main.cpp, uncomment and match it here:
; upload_flags = --auth=your-password-here

; Debug build: same as esp32dev but prints a periodic "loop alive" heartbeat so
; you can tell the sniffer is running even with no console attached. Flash with:
;   pio run -e esp32dev_debug -t upload
[env:esp32dev_debug]
extends = env:esp32dev
build_flags =
  ${env.build_flags}
  -D DEBUG_HEARTBEAT
